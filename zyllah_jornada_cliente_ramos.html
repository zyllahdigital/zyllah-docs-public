
<style>
*{box-sizing:border-box;margin:0;padding:0}
h2.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
.wrap{padding:1rem 0;font-family:var(--font-sans)}
.fase-header{display:flex;align-items:center;gap:10px;margin:20px 0 8px;cursor:pointer;user-select:none}
.fase-num{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:500;flex-shrink:0}
.fase-title{font-size:14px;font-weight:500;color:var(--color-text-primary);flex:1}
.fase-count{font-size:11px;color:var(--color-text-tertiary)}
.fase-chev{font-size:12px;color:var(--color-text-tertiary);transition:transform .2s}
.fase-chev.open{transform:rotate(90deg)}
.fase-body{display:none;margin-bottom:4px}
.fase-body.open{display:block}
.ramo{border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);margin-bottom:6px;overflow:hidden}
.ramo-header{display:flex;align-items:flex-start;gap:8px;padding:9px 12px;cursor:pointer}
.ramo-header:hover{background:var(--color-background-secondary)}
.ramo-sig{width:6px;height:6px;border-radius:50%;flex-shrink:0;margin-top:5px}
.ramo-label{font-size:13px;color:var(--color-text-primary);flex:1;line-height:1.4}
.ramo-tag{font-size:10px;font-weight:500;padding:2px 7px;border-radius:8px;flex-shrink:0;margin-top:1px}
.tag-ok{background:var(--color-background-success);color:var(--color-text-success)}
.tag-risco{background:var(--color-background-warning);color:var(--color-text-warning)}
.tag-perda{background:var(--color-background-danger);color:var(--color-text-danger)}
.tag-loop{background:var(--color-background-info);color:var(--color-text-info)}
.ramo-detail{display:none;padding:8px 12px 10px 26px;border-top:0.5px solid var(--color-border-tertiary);background:var(--color-background-secondary)}
.ramo-detail.open{display:block}
.detail-acao{font-size:12px;color:var(--color-text-secondary);line-height:1.6;margin-bottom:6px}
.detail-acao strong{font-weight:500;color:var(--color-text-primary)}
.sub-ramos{margin-top:6px}
.sub-ramo{display:flex;align-items:flex-start;gap:6px;padding:4px 0;border-top:0.5px solid var(--color-border-tertiary)}
.sub-ramo:first-child{border-top:none}
.sub-arrow{font-size:11px;color:var(--color-text-tertiary);flex-shrink:0;margin-top:2px}
.sub-text{font-size:12px;color:var(--color-text-secondary);line-height:1.4}
.sub-text em{color:var(--color-text-primary);font-style:normal;font-weight:500}
.nav-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.nav-btn{font-size:11px;font-weight:500;padding:4px 10px;border-radius:20px;border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-secondary);cursor:pointer;transition:all .15s}
.nav-btn:hover,.nav-btn.active{background:var(--color-background-secondary);color:var(--color-text-primary);border-color:var(--color-border-primary)}
.legend{display:flex;gap:14px;flex-wrap:wrap;margin-bottom:16px}
.leg{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--color-text-secondary)}
.leg-dot{width:8px;height:8px;border-radius:50%}
.prog-bar{height:3px;background:var(--color-background-secondary);border-radius:2px;margin:6px 0 16px}
.prog-fill{height:3px;border-radius:2px;transition:width .3s}
</style>

  navEl.appendChild(btn);

  const wrap = document.createElement('div');
  wrap.id='fase-'+f.id;

  const hdr = document.createElement('div');
  hdr.className='fase-header';
  hdr.onclick=()=>toggleFase(f.id);
  hdr.innerHTML=`<div class="fase-num" style="background:${f.bg};color:${f.cor}">${f.id}</div><div class="fase-title">${f.label}</div><div class="fase-count">${f.ramos.length} ramos</div><div class="fase-chev" id="chev-${f.id}">›</div>`;

  const body = document.createElement('div');
  body.className='fase-body';
  body.id='body-'+f.id;

  const descEl = document.createElement('div');
  descEl.style.cssText='font-size:12px;color:var(--color-text-secondary);margin-bottom:8px;padding-left:38px;';
  descEl.textContent=f.desc;
  body.appendChild(descEl);

  f.ramos.forEach((r,ri)=>{
    const rid=`r-${fi}-${ri}`;
    const rDiv=document.createElement('div');
    rDiv.className='ramo';

    const sigColor=r.sig==='ok'?'var(--color-text-success)':r.sig==='risco'?'var(--color-text-warning)':r.sig==='perda'?'var(--color-text-danger)':'var(--color-text-info)';
    const tagClass='tag-'+r.sig;

    let subsHTML='';
    if(r.subs){
      subsHTML='<div class="sub-ramos">'+r.subs.map(s=>`<div class="sub-ramo"><span class="sub-arrow">${s.a}</span><span class="sub-text"><em>${s.t.split(':')[0]+(s.t.includes(':')?':':'')}</em>${s.t.includes(':')?s.t.slice(s.t.indexOf(':')+1):''}</span></div>`).join('')+'</div>';
    }

    rDiv.innerHTML=`
      <div class="ramo-header" onclick="toggleRamo('${rid}')">
        <div class="ramo-sig" style="background:${sigColor}"></div>
        <div class="ramo-label">${r.label}</div>
        <span class="ramo-tag ${tagClass}">${r.sig==='ok'?'ideal':r.sig==='risco'?'risco':r.sig==='perda'?'perda':'loop'}</span>
      </div>
      <div class="ramo-detail" id="${rid}">
        <div class="detail-acao">${r.acao}</div>
        ${subsHTML}
      </div>`;

    body.appendChild(rDiv);
  });

  wrap.appendChild(hdr);
  wrap.appendChild(body);
  fasesEl.appendChild(wrap);
});

function toggleFase(id){
  const body=document.getElementById('body-'+id);
  const chev=document.getElementById('chev-'+id);
  const btn=[...navEl.children].find(b=>b.textContent===id);
  const isOpen=body.classList.contains('open');
  body.classList.toggle('open',!isOpen);
  chev.classList.toggle('open',!isOpen);
  btn&&btn.classList.toggle('active',!isOpen);
  updateProg();
}

function toggleRamo(id){
  const el=document.getElementById(id);
  el.classList.toggle('open');
  abertos.has(id)?abertos.delete(id):abertos.add(id);
  updateProg();
}

function updateProg(){
  const pct=Math.round((abertos.size/totalRamos)*100);
  progEl.style.width=pct+'%';
}
</script>
