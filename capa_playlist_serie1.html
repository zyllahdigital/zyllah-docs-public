.ov { position:absolute;inset:0;background:radial-gradient(ellipse 100% 100% at 50% 50%,rgba(6,6,8,.3) 0%,rgba(6,6,8,.85) 100%); }
/* Linha dourada vertical esquerda */
.bar { position:absolute;left:0;top:0;bottom:0;width:4px;background:linear-gradient(180deg,transparent,#C9A84C 20%,#C9A84C 80%,transparent); }
/* Logo centralizada */
.logo { position:absolute;top:50%;left:50%;transform:translate(-50%,-60%);width:260px;filter:drop-shadow(0 0 40px rgba(201,168,76,.25)); }
/* Linha separadora */
.sep { position:absolute;top:50%;left:50%;transform:translate(-50%,40px);display:flex;align-items:center;gap:16px;width:420px; }
.sep-line { flex:1;height:1px;background:linear-gradient(to right,transparent,rgba(201,168,76,.35)); }
.sep-line.rev { background:linear-gradient(to left,transparent,rgba(201,168,76,.35)); }
.sep-dia { width:5px;height:5px;background:#C9A84C;transform:rotate(45deg);opacity:.5; }
/* Texto série */
.serie-tag { position:absolute;top:50%;left:50%;transform:translate(-50%,68px);font-family:'Cinzel',serif;font-size:13px;color:rgba(201,168,76,.55);letter-spacing:6px;text-transform:uppercase;white-space:nowrap; }
/* Subtítulo */
.subtitle { position:absolute;bottom:72px;left:0;right:0;text-align:center;font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;font-style:italic;color:rgba(255,255,255,.45);letter-spacing:1px; }
/* Contador de episódios */
.ep-count { position:absolute;bottom:40px;left:50%;transform:translateX(-50%);font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;color:rgba(201,168,76,.4);letter-spacing:4px;text-transform:uppercase; }
/* Cantos decorativos */
.corner { position:absolute;width:32px;height:32px; }
.corner.tl { top:28px;left:28px;border-top:1px solid rgba(201,168,76,.25);border-left:1px solid rgba(201,168,76,.25); }
.corner.tr { top:28px;right:28px;border-top:1px solid rgba(201,168,76,.25);border-right:1px solid rgba(201,168,76,.25); }
.corner.bl { bottom:28px;left:28px;border-bottom:1px solid rgba(201,168,76,.25);border-left:1px solid rgba(201,168,76,.25); }
.corner.br { bottom:28px;right:28px;border-bottom:1px solid rgba(201,168,76,.25);border-right:1px solid rgba(201,168,76,.25); }
