<!DOCTYPE html>
<html><head><meta charset="UTF-8">
<meta name="viewport" content="width=1080, height=1920">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Barlow+Condensed:wght@400;600;700;800;900&family=Cinzel:wght@400;600&family=Jost:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
<style>

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body { background: #0A0806; }
  @keyframes fadeUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  @keyframes growLine { from { transform:scaleX(0); } to { transform:scaleX(1); } }
  .a1 { animation: fadeUp .5s ease forwards; }
  .a2 { animation: fadeUp .5s ease .5s forwards; opacity:0; }
  .a3 { animation: fadeUp .5s ease 1s forwards; opacity:0; }
  .a4 { animation: fadeUp .5s ease 1.5s forwards; opacity:0; }
  .a5 { animation: fadeUp .5s ease 2s forwards; opacity:0; }
  .a6 { animation: fadeUp .5s ease 2.5s forwards; opacity:0; }
  .a7 { animation: fadeUp .5s ease 3s forwards; opacity:0; }
  .alogo { animation: fadeIn .6s ease 3.4s forwards; opacity:0; }
  .alogo-early { animation: fadeIn .6s ease 1.6s forwards; opacity:0; }
  .alogo-late { animation: fadeIn .6s ease 5s forwards; opacity:0; }
  .aline { animation: growLine .5s ease forwards; transform-origin: left; }

  html, body { width:1080px; height:1920px; background:#0A0806; }
  .stage { position:absolute; width:1080px; height:1920px; background:#0A0806; overflow:hidden; }
  .center { position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center; }
  .logo-wrap { position:absolute;bottom:76px;right:32px;width:70px;opacity:.6; }
  .logo-wrap svg { width:100%;height:auto; }
  .aline { animation: growLine .5s ease 1s forwards; transform:scaleX(0); transform-origin:left; }
</style>
</head><body>

        <div style="position:absolute;inset:0;background-image:linear-gradient(rgba(184,151,106,.025) 1px,transparent 1px),linear-gradient(90deg,rgba(184,151,106,.025) 1px,transparent 1px);background-size:80px 80px;pointer-events:none;"></div>
        <div style="position:absolute;inset:0;background:radial-gradient(ellipse 60% 50% at 50% 50%,rgba(184,151,106,.06) 0%,transparent 70%);pointer-events:none;"></div>
        <div style="position:absolute;left:0;top:0;bottom:0;width:6px;background:linear-gradient(180deg,transparent 5%,#B8976A 25%,#8B6914 75%,transparent 95%);pointer-events:none;"></div>
  <div class="center" style="gap:20px;padding:80px;flex-direction:column;text-align:center;">
  <span class="a1" style="font-family:'Barlow Condensed',sans-serif;font-size:180px;font-weight:900;color:#fff;text-transform:uppercase;letter-spacing:-4px;line-height:.82;">CURTIDAS</span>
  <span class="a2" style="font-family:'Jost',sans-serif;font-size:64px;font-weight:300;color:rgba(255,255,255,.4);letter-spacing:4px;">não enchem</span>
  <div class="a3 aline" style="width:260px;height:1px;background:linear-gradient(to right,transparent,#B8976A,transparent);"></div>
  <span class="a4" style="font-family:'Barlow Condensed',sans-serif;font-size:180px;font-weight:900;color:#B8976A;text-transform:uppercase;letter-spacing:-4px;line-height:.82;">AGENDA.</span>
