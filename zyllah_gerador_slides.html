<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zyllah · Gerador de Slides</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --ink:#1A1714; --ink2:#242018; --ink3:#2E2820;
  --gold:#B8976A; --gold-l:#D4B896;
  --cream:#FAF7F2; --cream-m:#F0EBE1;
  --brown:#4A3F35;
  --ok:#6aaf7a; --warn:#c49a3a; --err:#c46464;
  --border:rgba(184,151,106,.13);
}
html{scroll-behavior:smooth;}
body{background:var(--ink);font-family:'Jost',sans-serif;font-weight:300;color:var(--cream);min-height:100vh;display:flex;flex-direction:column;}

/* TOPO */
.topo{background:var(--ink);border-bottom:1px solid var(--border);padding:15px 36px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;}
.topo-esq{display:flex;align-items:center;gap:14px;}
.topo-logo{width:24px;height:24px;}
.topo-nome{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:300;color:var(--gold);letter-spacing:.06em;}
.topo-sub{font-size:8px;color:rgba(255,255,255,.22);letter-spacing:.4em;text-transform:uppercase;display:block;margin-top:2px;}
.topo-dir{font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.18);}

/* LAYOUT */
.wrap{display:grid;grid-template-columns:350px 1fr;min-height:calc(100vh - 55px);}

/* PAINEL */
.painel{background:var(--ink2);border-right:1px solid var(--border);padding:28px 24px;overflow-y:auto;display:flex;flex-direction:column;}
.sec-label{font-size:8px;letter-spacing:.5em;text-transform:uppercase;color:var(--gold);padding-bottom:9px;border-bottom:1px solid var(--border);margin-bottom:16px;display:block;}

/* CAMPOS */
.campo{margin-bottom:13px;}
.campo label{font-size:8px;letter-spacing:.35em;text-transform:uppercase;color:rgba(255,255,255,.26);display:block;margin-bottom:5px;}
.campo input,.campo textarea,.campo select{
  width:100%;background:rgba(255,255,255,.03);border:1px solid rgba(184,151,106,.13);
  color:var(--cream);font-family:'Jost',sans-serif;font-size:13px;font-weight:300;
  padding:8px 10px;resize:vertical;transition:border-color .18s;
}
.campo input:focus,.campo textarea:focus,.campo select:focus{outline:none;border-color:rgba(184,151,106,.42);}
.campo select option{background:var(--ink2);}
.campo textarea{height:68px;line-height:1.65;}

/* SELETORES */
.tipo-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;margin-bottom:13px;}
.tipo-btn{padding:7px 3px;border:1px solid rgba(255,255,255,.06);font-size:9px;letter-spacing:.12em;
  text-transform:uppercase;color:rgba(255,255,255,.26);cursor:pointer;text-align:center;
  background:none;transition:all .14s;font-family:'Jost',sans-serif;}
.tipo-btn:hover{border-color:rgba(184,151,106,.22);}
.tipo-btn.sel{background:rgba(184,151,106,.09);border-color:rgba(184,151,106,.44);color:var(--gold);}

.formato-row,.fundo-row{display:flex;gap:5px;margin-bottom:13px;}
.fmt-btn,.fundo-btn{flex:1;padding:9px 3px;border:1px solid rgba(255,255,255,.06);font-size:9px;letter-spacing:.12em;
  text-transform:uppercase;color:rgba(255,255,255,.26);cursor:pointer;text-align:center;
  background:none;transition:all .14s;font-family:'Jost',sans-serif;}
.fmt-btn.sel,.fundo-btn.sel{background:rgba(184,151,106,.08);border-color:rgba(184,151,106,.44);color:var(--gold);}
.fmt-btn .dim{display:block;font-size:8px;color:rgba(255,255,255,.18);margin-top:3px;letter-spacing:.08em;}
.fmt-btn.sel .dim{color:rgba(184,151,106,.55);}
.fundo-swatch{display:block;width:14px;height:14px;margin:0 auto 3px;border:1px solid rgba(255,255,255,.1);}

/* LISTA DE SLIDES */
.slides-lista{margin-bottom:16px;flex:1;}
.slide-item{display:flex;align-items:center;justify-content:space-between;padding:7px 9px;
  background:rgba(255,255,255,.02);border:1px solid var(--border);margin-bottom:3px;cursor:pointer;transition:border-color .14s;}
.slide-item:hover{border-color:rgba(184,151,106,.25);}
.slide-item.ativo{border-color:rgba(184,151,106,.4);background:rgba(184,151,106,.05);}
.si-info{font-size:11px;color:rgba(255,255,255,.45);line-height:1.4;}
.si-tipo{font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);}
.si-del{background:none;border:none;color:rgba(255,255,255,.18);cursor:pointer;font-size:15px;padding:2px 6px;transition:color .14s;}
.si-del:hover{color:var(--err);}
.slides-vazio{font-size:11px;color:rgba(255,255,255,.16);letter-spacing:.1em;padding:18px 0;text-align:center;}

/* BOTÕES */
.btn{width:100%;padding:10px;font-family:'Jost',sans-serif;font-size:9px;letter-spacing:.25em;text-transform:uppercase;cursor:pointer;transition:all .18s;border:none;}
.btn-add{background:none;color:rgba(255,255,255,.32);border:1px solid rgba(255,255,255,.07);margin-bottom:6px;}
.btn-add:hover{color:var(--gold-l);border-color:rgba(184,151,106,.28);}
.btn-gerar{background:var(--gold);color:var(--ink);font-weight:500;margin-top:4px;}
.btn-gerar:hover{background:var(--gold-l);}
.btn-gerar:disabled{background:rgba(184,151,106,.22);color:rgba(255,255,255,.18);cursor:not-allowed;}
.btn-limpar{background:none;color:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.05);margin-top:5px;}
.btn-limpar:hover{color:var(--err);border-color:rgba(196,100,100,.28);}
.sep{height:1px;background:var(--border);margin:18px 0;}

/* PREVIEW */
.preview-area{background:#111;display:flex;flex-direction:column;align-items:center;padding:32px 36px;gap:20px;overflow-y:auto;}
.preview-topo{display:flex;align-items:center;justify-content:space-between;width:100%;max-width:660px;}
.preview-label{font-size:8px;letter-spacing:.45em;text-transform:uppercase;color:rgba(255,255,255,.16);}
.preview-nav{display:flex;gap:5px;align-items:center;}
.pnav{background:none;border:1px solid rgba(255,255,255,.07);color:rgba(255,255,255,.28);
  font-family:'Jost',sans-serif;font-size:9px;letter-spacing:.12em;text-transform:uppercase;
  padding:5px 11px;cursor:pointer;transition:all .14s;}
.pnav:hover{color:var(--gold);border-color:rgba(184,151,106,.28);}
.pnav-cnt{font-size:10px;color:rgba(255,255,255,.22);padding:0 8px;}
.preview-canvas{position:relative;flex-shrink:0;}
.preview-canvas canvas{display:block;max-width:100%;}

/* STATUS */
.status{width:100%;max-width:660px;padding:9px 13px;font-size:11px;letter-spacing:.08em;display:none;align-items:center;gap:9px;}
.status.show{display:flex;}
.status.ok{background:rgba(106,175,122,.09);border:1px solid rgba(106,175,122,.22);color:var(--ok);}
.status.err{background:rgba(196,100,100,.09);border:1px solid rgba(196,100,100,.22);color:var(--err);}
.status.load{background:rgba(184,151,106,.06);border:1px solid rgba(184,151,106,.18);color:var(--gold);}
.status-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0;}
.status-dot.spin{animation:spin .9s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}

.link-res{display:none;width:100%;max-width:660px;padding:11px 15px;
  background:rgba(184,151,106,.06);border:1px solid rgba(184,151,106,.2);
  color:var(--gold);font-size:11px;letter-spacing:.08em;text-decoration:none;
  justify-content:space-between;align-items:center;}
.link-res.show{display:flex;}
.link-res:hover{background:rgba(184,151,106,.11);}

@media(max-width:820px){.wrap{grid-template-columns:1fr;}.preview-area{display:none;}}
</style>
</head>
<body>

<header class="topo">
  <div class="topo-esq">
    <svg class="topo-logo" viewBox="0 0 1080 1080" xmlns="http://www.w3.org/2000/svg">
      <path fill="#c3a366" d="M336.72,395.72l-2.56-108.02,361.99-.56-139.33,201.49h-45.04l110.91-162.7-.32-2.46-251.57,1.13s-6.53,20.66-9.51,34.27c-3.2,14.6-8.17,36.75-8.17,36.75l-16.4.12Z"/>
      <polygon fill="#c1a260" points="759.77 286.08 635.69 490.35 606.07 490.52 759.77 286.08"/>
      <path fill="#c7a866" d="M368.72,571.78c6.36-8.49,19.37-22.49,34.43-35.86,25.37-22.52,52.29-32.93,78.89-35.68,46.33-4.78,93.95,16.68,142.93,17.94,48.53,1.26,74.37-15.75,110.42-42.55-20.82,26.1-56.02,56.17-91.17,61.61-8.66,1.47-16.88,1.46-25.57.7-30.3-2.63-73.16-13.06-106.56-15.9-33.4-1.42-65.74,5.49-96.63,20.78-14.22,7.04-38.42,21.82-46.67,28.94h-.06Z"/>
      <path fill="#a58346" d="M760.37,680.02l4.22,111.19-383.6,2.71,162.35-235.5h42.43l-135.01,197.18,1.16,3.58,272.41-2.04s6.95-18.53,11.82-39.42c3.94-16.88,6.47-37.43,6.47-37.43l17.73-.28Z"/>
      <polygon fill="#a38342" points="315.41 790.04 462.38 556.94 495.41 556.77 315.41 790.04"/>
    </svg>
    <div>
      <span class="topo-nome">Zyllah Digital</span>
      <span class="topo-sub">Gerador de Slides</span>
    </div>
  </div>
  <div class="topo-dir" id="topoStatus">—</div>
</header>

<div class="wrap">
<aside class="painel">

  <span class="sec-label">Apresentação</span>

  <div class="campo">
    <label>Título da apresentação</label>
    <input type="text" id="tituloApres" placeholder="Ex: CFM 2336 — O que muda para você">
  </div>

  <div class="campo">
    <label>Formato</label>
    <div class="formato-row">
      <button class="fmt-btn sel" data-fmt="1:1" onclick="selFmt(this)">
        Instagram<span class="dim">1080 × 1080</span>
      </button>
      <button class="fmt-btn" data-fmt="9:16" onclick="selFmt(this)">
        Stories<span class="dim">1080 × 1920</span>
      </button>
      <button class="fmt-btn" data-fmt="16:9" onclick="selFmt(this)">
        YouTube<span class="dim">1920 × 1080</span>
      </button>
    </div>
  </div>

  <div class="sep"></div>
  <span class="sec-label">Adicionar Slide</span>

  <div class="campo">
    <label>Tipo</label>
    <div class="tipo-grid">
      <button class="tipo-btn sel" data-tipo="capa"       onclick="selTipo(this)">Capa</button>
      <button class="tipo-btn"     data-tipo="motivo"     onclick="selTipo(this)">Motivo</button>
      <button class="tipo-btn"     data-tipo="conteudo"   onclick="selTipo(this)">Conteúdo</button>
      <button class="tipo-btn"     data-tipo="frase"      onclick="selTipo(this)">Frase</button>
      <button class="tipo-btn"     data-tipo="quote"      onclick="selTipo(this)">Quote</button>
      <button class="tipo-btn"     data-tipo="fechamento" onclick="selTipo(this)">Fechamento</button>
    </div>
  </div>

  <div class="campo" id="campoTag">
    <label>Tag <span style="color:rgba(255,255,255,.14);font-size:9px;">ex: "Motivo 01"</span></label>
    <input type="text" id="tag" placeholder="Contexto exibido no topo">
  </div>

  <div class="campo">
    <label>Título</label>
    <input type="text" id="titulo" placeholder="Texto principal do slide">
  </div>

  <div class="campo">
    <label id="corpoLabel">Corpo</label>
    <textarea id="corpo" placeholder="Desenvolvimento / apoio…"></textarea>
  </div>

  <div class="campo">
    <label>Fundo</label>
    <div class="fundo-row">
      <button class="fundo-btn sel" data-fundo="auto"      onclick="selFundo(this)">Auto</button>
      <button class="fundo-btn"     data-fundo="ink"       onclick="selFundo(this)"><span class="fundo-swatch" style="background:#1A1714;"></span>Escuro</button>
      <button class="fundo-btn"     data-fundo="cream"     onclick="selFundo(this)"><span class="fundo-swatch" style="background:#FAF7F2;"></span>Claro</button>
      <button class="fundo-btn"     data-fundo="cream_mid" onclick="selFundo(this)"><span class="fundo-swatch" style="background:#F0EBE1;"></span>Mid</button>
    </div>
  </div>

  <button class="btn btn-add" onclick="adicionarSlide()">+ Adicionar à lista</button>
  <button class="btn btn-add" onclick="renderPreview()">↺ Atualizar preview</button>

  <div class="sep"></div>
  <span class="sec-label">Slides (<span id="contSlides">0</span>)</span>

  <div class="slides-lista" id="slidesLista">
    <div class="slides-vazio">Nenhum slide adicionado.</div>
  </div>

  <div class="sep"></div>
  <button class="btn btn-gerar" id="btnGerar" onclick="gerarApresentacao()">▶ Gerar no Google Slides</button>
  <button class="btn btn-limpar" onclick="limparTudo()">Limpar tudo</button>

</aside>

<main class="preview-area">
  <div class="preview-topo">
    <span class="preview-label">Preview</span>
    <div class="preview-nav">
      <button class="pnav" onclick="navSlide(-1)">‹ Ant</button>
      <span class="pnav-cnt" id="navCnt">— / —</span>
      <button class="pnav" onclick="navSlide(1)">Próx ›</button>
    </div>
  </div>

  <div class="status" id="statusBar">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusMsg"></span>
  </div>

  <a class="link-res" id="linkRes" href="#" target="_blank">
    <span>✓ Apresentação criada — abrir no Google Drive</span>
    <span style="font-size:15px;">→</span>
  </a>

  <div class="preview-canvas" id="previewCanvas">
    <canvas id="cvs"></canvas>
  </div>
</main>
</div>

<script>
// ═══════════════════════════════
// CONFIGURAÇÃO — cole sua URL aqui após publicar o Apps Script
// ═══════════════════════════════
var APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwTKs-7nLAVJf6HeWjytsfGjvKHNBSSnTVQFH29E02hrOJ5AXYS_PX4C8Vmmm_XdGI-fA/exec';

// ═══════════════════════════════
// ESTADO
// ═══════════════════════════════
var slides     = [];
var slidxAtual = 0;
var fmtAtual   = '1:1';
var tipoAtual  = 'capa';
var fundoAtual = 'auto';

var DIMS = {
  '1:1':  {w:1080, h:1080, esc:0.50},
  '9:16': {w:1080, h:1920, esc:0.28},
  '16:9': {w:1920, h:1080, esc:0.40}
};

// Logo SVG → Image
var logoImg = null;
(function(){
  var svg = '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080">'
    +'<path fill="#c3a366" d="M336.72,395.72l-2.56-108.02,361.99-.56-139.33,201.49h-45.04l110.91-162.7-.32-2.46-251.57,1.13s-6.53,20.66-9.51,34.27c-3.2,14.6-8.17,36.75-8.17,36.75l-16.4.12Z"/>'
    +'<polygon fill="#c1a260" points="759.77 286.08 635.69 490.35 606.07 490.52 759.77 286.08"/>'
    +'<path fill="#c7a866" d="M368.72,571.78c6.36-8.49,19.37-22.49,34.43-35.86,25.37-22.52,52.29-32.93,78.89-35.68,46.33-4.78,93.95,16.68,142.93,17.94,48.53,1.26,74.37-15.75,110.42-42.55-20.82,26.1-56.02,56.17-91.17,61.61-8.66,1.47-16.88,1.46-25.57.7-30.3-2.63-73.16-13.06-106.56-15.9-33.4-1.42-65.74,5.49-96.63,20.78-14.22,7.04-38.42,21.82-46.67,28.94h-.06Z"/>'
    +'<path fill="#a58346" d="M760.37,680.02l4.22,111.19-383.6,2.71,162.35-235.5h42.43l-135.01,197.18,1.16,3.58,272.41-2.04s6.95-18.53,11.82-39.42c3.94-16.88,6.47-37.43,6.47-37.43l17.73-.28Z"/>'
    +'<polygon fill="#a38342" points="315.41 790.04 462.38 556.94 495.41 556.77 315.41 790.04"/>'
    +'</svg>';
  var blob = new Blob([svg],{type:'image/svg+xml'});
  logoImg = new Image();
  logoImg.src = URL.createObjectURL(blob);
})();

// ═══════════════════════════════
// SELETORES
// ═══════════════════════════════
function selFmt(btn){
  document.querySelectorAll('.fmt-btn').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel'); fmtAtual = btn.dataset.fmt;
  if(slides.length) renderPreview();
}
function selTipo(btn){
  document.querySelectorAll('.tipo-btn').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel'); tipoAtual = btn.dataset.tipo;
  atualizarDicas();
}
function selFundo(btn){
  document.querySelectorAll('.fundo-btn').forEach(b=>b.classList.remove('sel'));
  btn.classList.add('sel'); fundoAtual = btn.dataset.fundo;
}
function atualizarDicas(){
  var dicas={capa:'subtítulo / contexto',motivo:'desenvolvimento',conteudo:'texto de apoio',
    frase:'texto abaixo da linha',quote:'pergunta de engajamento',fechamento:'CTA / chamada para ação'};
  document.getElementById('corpoLabel').textContent = 'Corpo — '+dicas[tipoAtual];
  document.getElementById('campoTag').style.display = ['frase','quote'].includes(tipoAtual)?'none':'';
}

// ═══════════════════════════════
// GERENCIAR LISTA
// ═══════════════════════════════
function adicionarSlide(){
  var titulo = document.getElementById('titulo').value.trim();
  if(!titulo){ mostrarStatus('err','Preencha o Título.'); return; }
  slides.push({
    tipo:tipoAtual, tag:document.getElementById('tag').value.trim(),
    titulo:titulo,  corpo:document.getElementById('corpo').value.trim(),
    fundo:fundoAtual
  });
  document.getElementById('titulo').value='';
  document.getElementById('corpo').value='';
  document.getElementById('tag').value='';
  slidxAtual = slides.length-1;
  renderLista(); renderPreview(); esconderStatus();
}

function removerSlide(i){
  slides.splice(i,1);
  if(slidxAtual>=slides.length) slidxAtual=Math.max(0,slides.length-1);
  renderLista(); renderPreview();
}

function irSlide(i){ slidxAtual=i; renderLista(); renderPreview(); }

function renderLista(){
  var el=document.getElementById('slidesLista');
  document.getElementById('contSlides').textContent=slides.length;
  if(!slides.length){ el.innerHTML='<div class="slides-vazio">Nenhum slide adicionado.</div>'; return; }
  el.innerHTML=slides.map((s,i)=>`
    <div class="slide-item${i===slidxAtual?' ativo':''}" onclick="irSlide(${i})">
      <div class="si-info">
        <span class="si-tipo">${s.tipo}${s.tag?' · '+s.tag:''}</span><br>
        ${s.titulo.substring(0,40)}${s.titulo.length>40?'…':''}
      </div>
      <button class="si-del" onclick="event.stopPropagation();removerSlide(${i})">×</button>
    </div>`).join('');
}

// ═══════════════════════════════
// PREVIEW CANVAS
// ═══════════════════════════════
function navSlide(d){
  if(!slides.length) return;
  slidxAtual=(slidxAtual+d+slides.length)%slides.length;
  renderLista(); renderPreview();
}

function decidirFundo(tipo,idx){
  if(['capa','frase','quote','fechamento'].includes(tipo)) return 'ink';
  return idx%2===0?'ink':'cream';
}

function pad2(n){return n<10?'0'+n:String(n);}

function wrapText(ctx,text,x,y,maxW,lineH){
  var words=text.split(' '),line='';
  for(var i=0;i<words.length;i++){
    var test=line+words[i]+' ';
    if(ctx.measureText(test).width>maxW&&i>0){ctx.fillText(line,x,y);line=words[i]+' ';y+=lineH;}
    else line=test;
  }
  ctx.fillText(line,x,y);
}

function renderPreview(){
  var total=slides.length;
  document.getElementById('navCnt').textContent=total?(slidxAtual+1)+' / '+total:'— / —';
  if(!total) return;

  var s=slides[slidxAtual];
  var dim=DIMS[fmtAtual];
  var W=dim.w, H=dim.h, ESC=dim.esc;
  var cvs=document.getElementById('cvs');
  var ctx=cvs.getContext('2d');
  cvs.width=Math.round(W*ESC); cvs.height=Math.round(H*ESC);
  ctx.save(); ctx.scale(ESC,ESC);

  var fundo=s.fundo==='auto'?decidirFundo(s.tipo,slidxAtual):s.fundo;
  var dark=fundo==='ink';

  // Fundo
  ctx.fillStyle=fundo==='ink'?'#1A1714':fundo==='cream_mid'?'#F0EBE1':'#FAF7F2';
  ctx.fillRect(0,0,W,H);

  var MAR=W*0.074;
  var cTit  = dark?'#FAF7F2':'#1A1714';
  var cCorpo= dark?'#C8C0B4':'#4A3F35';
  var cTag  = '#B8976A';
  var cNum  = dark?'#5A5040':'#9A8A78';
  var cApoio= dark?'#7A7060':'#7A6A58';

  // ── Tag ──
  var semTag=['frase','quote'];
  if(s.tag && !semTag.includes(s.tipo)){
    ctx.font=`300 ${W*0.013}px Jost,sans-serif`;
    ctx.fillStyle=cTag; ctx.textAlign='start';
    ctx.fillText(s.tag.toUpperCase(), MAR, MAR+W*0.022);
  }

  if(s.tipo==='capa'){
    // Título itálico grande
    ctx.font=`300 italic ${W*0.068}px 'Cormorant Garamond',serif`;
    ctx.fillStyle=cTit;
    wrapText(ctx,s.titulo,MAR,H*0.34,W-MAR*2,W*0.082);
    // Linha
    ctx.strokeStyle='#B8976A'; ctx.lineWidth=W*0.0012;
    ctx.beginPath(); ctx.moveTo(MAR,H*0.70); ctx.lineTo(MAR+W*0.070,H*0.70); ctx.stroke();
    // Subtítulo
    if(s.corpo){
      ctx.font=`300 ${W*0.020}px Jost`; ctx.fillStyle=cApoio;
      ctx.fillText(s.corpo.toUpperCase().substring(0,55),MAR,H*0.70+W*0.026);
    }

  } else if(s.tipo==='frase'){
    ctx.font=`300 italic ${W*0.057}px 'Cormorant Garamond',serif`;
    ctx.fillStyle=cTit; ctx.textAlign='center';
    wrapText(ctx,s.titulo,MAR,H*0.40,W-MAR*2,W*0.072);
    ctx.strokeStyle='#B8976A'; ctx.lineWidth=W*0.0012;
    ctx.beginPath(); ctx.moveTo(W/2-W*0.038,H*0.73); ctx.lineTo(W/2+W*0.038,H*0.73); ctx.stroke();
    if(s.corpo){
      ctx.font=`300 ${W*0.015}px Jost`; ctx.fillStyle=cApoio;
      ctx.fillText(s.corpo.substring(0,55),W/2,H*0.73+W*0.028);
    }
    ctx.textAlign='start';

  } else if(s.tipo==='quote'){
    ctx.font=`300 ${W*0.096}px 'Cormorant Garamond',serif`;
    ctx.fillStyle=dark?'#3A3028':'#C8C0B4';
    ctx.fillText('\u201C',MAR-W*0.010,MAR+W*0.078);
    ctx.font=`300 italic ${W*0.036}px 'Cormorant Garamond',serif`;
    ctx.fillStyle=cTit; ctx.textAlign='center';
    wrapText(ctx,s.titulo,MAR,H*0.40,W-MAR*2,W*0.054);
    ctx.strokeStyle='#B8976A'; ctx.lineWidth=W*0.0012;
    ctx.beginPath(); ctx.moveTo(W/2-W*0.034,H*0.72); ctx.lineTo(W/2+W*0.034,H*0.72); ctx.stroke();
    if(s.corpo){
      ctx.font=`300 ${W*0.015}px Jost`; ctx.fillStyle='#B8976A';
      ctx.fillText(s.corpo.substring(0,58),W/2,H*0.72+W*0.030);
    }
    ctx.textAlign='start';

  } else {
    // motivo, conteudo, fechamento
    ctx.font=`300 italic ${W*0.050}px 'Cormorant Garamond',serif`;
    ctx.fillStyle=cTit;
    wrapText(ctx,s.titulo,MAR,H*0.24,W-MAR*2,W*0.064);
    ctx.strokeStyle='#B8976A'; ctx.lineWidth=W*0.0012;
    ctx.beginPath(); ctx.moveTo(MAR,H*0.52); ctx.lineTo(MAR+W*0.062,H*0.52); ctx.stroke();
    if(s.corpo){
      ctx.font=`300 ${W*0.017}px Jost`; ctx.fillStyle=cCorpo;
      wrapText(ctx,s.corpo,MAR,H*0.56,W-MAR*2,W*0.026);
    }
  }

  // ── Numeração ──
  ctx.font=`300 ${W*0.012}px 'Cormorant Garamond',serif`;
  ctx.fillStyle=cNum; ctx.textAlign='start';
  ctx.fillText(pad2(slidxAtual+1)+' · '+pad2(total), MAR, H-MAR*0.80);

  // ── Logo (canto inferior direito) ──
  var logoH=W*0.068, logoW=logoH;
  var lx=W-MAR-logoW, ly=H-MAR*0.80-logoH;
  if(logoImg&&logoImg.complete&&logoImg.naturalWidth>0){
    ctx.drawImage(logoImg,lx,ly,logoW,logoH);
  } else {
    ctx.font=`300 ${W*0.011}px Jost`; ctx.fillStyle=dark?'#B8976A':'#8A7A6A';
    ctx.textAlign='end';
    ctx.fillText('ZYLLAH',W-MAR,H-MAR*0.80);
  }

  ctx.restore();
}

// ═══════════════════════════════
// GERAR NO GOOGLE SLIDES
// ═══════════════════════════════
function gerarApresentacao(){
  if(!slides.length){ mostrarStatus('err','Adicione pelo menos um slide.'); return; }
  var titulo=document.getElementById('tituloApres').value.trim();
  if(!titulo){ mostrarStatus('err','Preencha o título da apresentação.'); return; }
  if(APPS_SCRIPT_URL.includes('COLE_A_URL')){
    mostrarStatus('err','Cole a URL do Apps Script na variável APPS_SCRIPT_URL no código.');
    return;
  }

  document.getElementById('btnGerar').disabled=true;
  document.getElementById('linkRes').classList.remove('show');
  mostrarStatus('load','Gerando apresentação no Google Drive…');
  document.getElementById('topoStatus').textContent='Gerando…';

  fetch(APPS_SCRIPT_URL,{
    method:'POST',
    body:JSON.stringify({titulo,formato:fmtAtual,slides})
  })
  .then(r=>r.json())
  .then(res=>{
    document.getElementById('btnGerar').disabled=false;
    if(res.ok){
      mostrarStatus('ok','Apresentação criada com sucesso!');
      document.getElementById('topoStatus').textContent='✓ Criado';
      var l=document.getElementById('linkRes');
      l.href=res.url; l.classList.add('show');
    } else {
      mostrarStatus('err','Erro: '+(res.erro||'resposta inválida.'));
      document.getElementById('topoStatus').textContent='Erro';
    }
  })
  .catch(e=>{
    document.getElementById('btnGerar').disabled=false;
    mostrarStatus('err','Falha de conexão: '+e.message);
    document.getElementById('topoStatus').textContent='Erro';
  });
}

// ═══════════════════════════════
// STATUS
// ═══════════════════════════════
function mostrarStatus(tipo,msg){
  var bar=document.getElementById('statusBar');
  var dot=document.getElementById('statusDot');
  bar.className='status show '+tipo;
  dot.className='status-dot'+(tipo==='load'?' spin':'');
  document.getElementById('statusMsg').textContent=msg;
}
function esconderStatus(){ document.getElementById('statusBar').className='status'; }

// ═══════════════════════════════
// LIMPAR
// ═══════════════════════════════
function limparTudo(){
  if(slides.length&&!confirm('Limpar todos os slides?')) return;
  slides=[]; slidxAtual=0;
  ['titulo','corpo','tag','tituloApres'].forEach(id=>document.getElementById(id).value='');
  renderLista();
  document.getElementById('navCnt').textContent='— / —';
  document.getElementById('linkRes').classList.remove('show');
  esconderStatus();
  document.getElementById('topoStatus').textContent='—';
  var cvs=document.getElementById('cvs');
  cvs.getContext('2d').clearRect(0,0,cvs.width,cvs.height);
}

// Init
atualizarDicas();
